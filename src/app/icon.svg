<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Pill capsule -->
  <g transform="translate(256,256) rotate(-45)">
    <!-- Left half -->
    <rect x="-120" y="-50" width="120" height="100" rx="50" fill="#ffffff"/>
    <!-- Right half -->
    <rect x="0" y="-50" width="120" height="100" rx="50" fill="#ccfbf1"/>
    <!-- Center line -->
    <line x1="0" y1="-50" x2="0" y2="50" stroke="#0d9488" stroke-width="3" opacity="0.4"/>
  </g>
  <!-- Plus sign -->
  <g transform="translate(380,130)">
    <rect x="-20" y="-6" width="40" height="12" rx="4" fill="#ffffff" opacity="0.9"/>
    <rect x="-6" y="-20" width="12" height="40" rx="4" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
